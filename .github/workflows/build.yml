name: Cross-platform

on:
  pull_request:
    branches: [ "main" ]

jobs:

  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - goos: linux
          goarch: amd64
          artifact_name: bibcheck-linux-amd64
        - goos: darwin
          goarch: arm64
          artifact_name: bibcheck-darwin-arm64
        - goos: darwin
          goarch: amd64
          artifact_name: bibcheck-darwin-amd64
        - goos: windows
          goarch: amd64
          artifact_name: bibcheck-windows-amd64.exe
    steps:
      - name: Set timezone
        run: sudo timedatectl set-timezone "America/Denver"

      - name: Set BUILD_DATE
        run: |
          BUILD_DATE=$(date +%Y-%m-%d)
          echo "BUILD_DATE=$BUILD_DATE" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version: '1.25'

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: go build -v -ldflags "-X github.com/sandialabs/bibcheck/version.gitSha=$GIT_SHA -X github.com/sandialabs/bibcheck/version.buildDate=$BUILD_DATE -X github.com/sandialabs/bibcheck/version.gitRefName=$GIT_REF_NAME" -o "${{ matrix.artifact_name }}" main.go
